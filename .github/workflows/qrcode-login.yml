name: 扫码登录（单账号）

on:
  workflow_dispatch:
    inputs:
      account_count:
        description: '账号数量（固定为1）'
        required: true
        default: '1'
        type: choice
        options:
          - '1'

jobs:
  qrcode-login:
    runs-on: ubuntu-latest
    env:
      ACCOUNT_COUNT: ${{ github.event.inputs.account_count || '1' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: 安装 GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "安装 GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          gh --version
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ 错误: PAT Secret 未设置"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 下载 BiliToolPro
        run: |
          ASSETS_URL=$(curl -s https://api.github.com/repos/RayWangQvQ/BiliBiliToolPro/releases/latest | jq -r '.assets[] | select(.name | contains("linux-x64.zip")) | .browser_download_url')
          [ -n "$ASSETS_URL" ] || { echo "❌ 未找到发布文件"; exit 1; }
          wget -q "$ASSETS_URL" -O BiliToolPro.zip
          unzip -q BiliToolPro.zip -d BiliTool

      - name: 扫码登录并提取 Cookie
        run: |
          set -e
          cd BiliTool
          EXECUTABLE=$(find . -type f -name "Ray.BiliBiliTool.Console" -o -name "Ray.BiliBiliTool.Console.dll" | head -n 1)
          chmod +x "$EXECUTABLE"

          echo "======================================================"
          echo "📱 正在登录"
          echo "======================================================"

          if [[ "$EXECUTABLE" == *.dll ]]; then
            dotnet "$EXECUTABLE" --runTasks=Login | tee login.log
          else
            "$EXECUTABLE" --runTasks=Login | tee login.log
          fi

          # 显示二维码链接
          LINK=$(grep -oP 'https://tool\.lu/qrcode/basic\.html\?text=[^ ]+' login.log | head -1)
          if [ -n "$LINK" ]; then
            echo ""
            echo "======================================================"
            echo "📱 请点击以下链接扫描二维码："
            echo "$LINK"
            echo "======================================================"
            echo ""
          fi

          # 定位 cookies.json
          COOKIE_FILE="linux-x64/cookies.json"
          [ -f "$COOKIE_FILE" ] || COOKIE_FILE=$(find .. -name "cookies.json" | head -n 1)
          [ -f "$COOKIE_FILE" ] || { echo "❌ cookies.json 未生成"; exit 1; }
          echo "✅ 找到 cookies.json：$COOKIE_FILE"

          # 去除 BOM 头
          CLEANED="cookies_clean.json"
          sed '1s/^\xEF\xBB\xBF//' "$COOKIE_FILE" > "$CLEANED"

          # 将文件内容合并为一行（方便跨行处理）
          FLAT=$(tr -d '\n' < "$CLEANED")

          # 使用正则从折叠后的内容中提取 Cookie 字符串（位于 "BiliBiliCookies":[" 之后的下一个双引号内）
          COOKIE=$(echo "$FLAT" | grep -oP '"BiliBiliCookies":\[\s*"\K[^"]+')

          if [ -z "$COOKIE" ]; then
            echo "❌ 无法提取 Cookie，折叠后内容如下："
            echo "$FLAT"
            exit 1
          fi

          echo "✅ Cookie 提取成功，长度：${#COOKIE}"
          echo "预览前50字符：${COOKIE:0:50}"

          # 测试有效性
          echo "测试 Cookie 有效性..."
          RESP=$(curl -s -b "$COOKIE" "https://api.bilibili.com/x/web-interface/nav")
          if echo "$RESP" | jq -e '.code == 0' > /dev/null; then
            USER_NAME=$(echo "$RESP" | jq -r '.data.uname')
            echo "✅ Cookie 有效，用户：$USER_NAME"
          else
            MSG=$(echo "$RESP" | jq -r .message)
            echo "❌ Cookie 无效，返回消息：$MSG"
            exit 1
          fi

          # 保存到 Secrets
          echo "保存 Cookie 到 Secrets (BILI_COOKIE)..."
          echo "$COOKIE" | gh secret set BILI_COOKIE --repos="${{ github.repository }}"
          echo "✅ 保存成功"
          echo "🎉 登录完成"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
